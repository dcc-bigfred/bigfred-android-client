name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for CI build artifacts
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          DEADLINE=$(( $(date +%s) + 1800 ))
          RUN_ID=""

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            RUN_JSON="$(gh run list --workflow=ci.yml --commit="$SHA" --limit=1 --json databaseId,status,conclusion)"
            if [ "$RUN_JSON" = "[]" ]; then
              echo "CI workflow run for ${SHA} not found yet; retrying..."
              sleep 15
              continue
            fi

            STATUS="$(echo "$RUN_JSON" | jq -r '.[0].status')"
            CONCLUSION="$(echo "$RUN_JSON" | jq -r '.[0].conclusion')"
            RUN_ID="$(echo "$RUN_JSON" | jq -r '.[0].databaseId')"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" != "success" ]; then
                echo "CI workflow run ${RUN_ID} finished with conclusion: ${CONCLUSION}"
                exit 1
              fi
              echo "CI workflow run ${RUN_ID} succeeded"
              echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "CI workflow run ${RUN_ID} status=${STATUS}; waiting..."
            sleep 15
          done

          echo "Timed out after 30 minutes waiting for CI workflow on commit ${SHA}"
          exit 1

      - name: Download CI APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ steps.ci.outputs.run_id }}" \
            --name release-apk \
            --dir release-assets

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          else
            echo "Release ${TAG} already exists"
          fi

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mapfile -d '' FILES < <(find release-assets -type f -name '*.apk' -print0)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No APK assets found"
            exit 1
          fi
          gh release upload "$TAG" "${FILES[@]}" --clobber

name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Decode release keystore
        env:
          BIGFRED_STORE_FILE_CONTENT: ${{ secrets.BIGFRED_STORE_FILE_CONTENT }}
        run: |
          set -euo pipefail
          if [ -z "${BIGFRED_STORE_FILE_CONTENT:-}" ]; then
            echo "No BIGFRED_STORE_FILE_CONTENT secret; release APK will use debug signing"
            exit 0
          fi
          echo "$BIGFRED_STORE_FILE_CONTENT" | base64 -d > "${RUNNER_TEMP}/bigfred-release.jks"
          echo "BIGFRED_STORE_FILE=${RUNNER_TEMP}/bigfred-release.jks" >> "$GITHUB_ENV"

      - name: Unit tests
        env:
          GRADLE_FLAGS: ""
        run: make test

      - name: Build release APK
        env:
          GRADLE_FLAGS: ""
          BIGFRED_STORE_PASSWORD: ${{ secrets.BIGFRED_STORE_PASSWORD }}
          BIGFRED_KEY_ALIAS: ${{ secrets.BIGFRED_KEY_ALIAS }}
          BIGFRED_KEY_PASSWORD: ${{ secrets.BIGFRED_KEY_PASSWORD }}
        run: make apk

      - name: Stage APK artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            NAME="bigfred-android-${GITHUB_REF_NAME}.apk"
          else
            NAME="bigfred-android-${GITHUB_SHA::7}.apk"
          fi
          cp app/build/outputs/apk/release/app-release.apk "dist/${NAME}"
          echo "APK_NAME=${NAME}" >> "$GITHUB_ENV"
          ls -lh dist/

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: dist/
          if-no-files-found: error
          retention-days: 90
